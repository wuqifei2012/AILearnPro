# ═══════════════════════════════════════════════════════════════════════════════
# HUGO BLOX — PARAMETER CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════
hugoblox:
  schema: "2.0"

  # ── IDENTITY ───────────────────────────────────────────────────────────────
  identity:
    name: "AI Research Lab"
    organization: "AI Research Laboratory"
    type: organization
    tagline: "Advancing Artificial Intelligence Through Open Research"
    description: "An open-source AI research laboratory focused on machine learning, natural language processing, computer vision, and intelligent systems. We publish cutting-edge research and build practical AI tools."

    social:
      twitter: "AIResearchLab"
      github: "wuqifei2012"
      linkedin: "ai-research-lab"
      scholar: "https://scholar.google.com"

  # ── THEME ──────────────────────────────────────────────────────────────────
  theme:
    mode: system
    pack: "default"
    colors:
      primary: "blue"
      secondary: "indigo"
      neutral: "slate"
    colors_light: {}
    colors_dark: {}
    surfaces:
      background: ""
      foreground: ""
      header:
        background: ""
        foreground: ""
      footer:
        background: ""
        foreground: ""

  # ── TYPOGRAPHY ─────────────────────────────────────────────────────────────
  typography:
    pack: "academic"

  # ── LAYOUT ─────────────────────────────────────────────────────────────────
  layout:
    radius: "md"
    spacing: "spacious"
    avatar_shape: circle

  # ── HEADER ─────────────────────────────────────────────────────────────────
  header:
    enable: true
    style: navbar
    sticky: true
    align: center
    search: true
    theme_toggle: true
    theme_picker: true
    language_switcher: true
    cta:
      enable: true
      text: "Get Started"
      url: "#projects"

  # ── FOOTER ─────────────────────────────────────────────────────────────────
  footer:
    style: columns
    language_switcher: true
    text: ""

  # ── COPYRIGHT ──────────────────────────────────────────────────────────────
  copyright:
    notice: "© {year} AI Research Lab. This work is licensed under {license}"
    license:
      type: cc
      allow_derivatives: true
      share_alike: true
      allow_commercial: false

  # ── SEO ────────────────────────────────────────────────────────────────────
  seo:
    title: "AI Research Lab — Machine Learning & Intelligent Systems"
    location:
      address:
        street: ""
        city: ""
        region: ""
        postal_code: ""
        country: ""
      coordinates:
        latitude: null
        longitude: null
      phone: ""
    ai:
      allow:
        - /
      disallow: []
      note: "Public research content. AI crawlers may index publications, projects, and blog posts."
      contact: "contact@airesearch.lab"

  # ── CONTENT ────────────────────────────────────────────────────────────────
  content:
    math:
      enable: true
    toc:
      enable: true
    reading_time:
      enable: true
    citations:
      style: apa

  # ── SEARCH ─────────────────────────────────────────────────────────────────
  search:
    enable: true
    suggestions:
      - "Machine Learning"
      - "Natural Language Processing"
      - "Computer Vision"
      - "Deep Learning"
      - "Reinforcement Learning"
    quick_actions: []

  # ── COMMENTS ───────────────────────────────────────────────────────────────
  comments:
    enable: false
    provider: ""
    giscus:
      repo: ""
      repo_id: ""
      category: ""
      category_id: ""
    disqus:
      shortname: ""

  # ── ANALYTICS ──────────────────────────────────────────────────────────────
  analytics:
    google:
      measurement_id: ""
    google_tag_manager:
      container_id: ""
    plausible:
      domain: ""
    fathom:
      site_id: ""
    pirsch:
      site_id: ""
    clarity:
      project_id: ""
    baidu:
      site_id: ""

  # ── VERIFICATION ───────────────────────────────────────────────────────────
  verification:
    google: ""
    bing: ""
    baidu: ""
    yandex: ""
    pinterest: ""
    naver: ""

  # ── REPOSITORY ─────────────────────────────────────────────────────────────
  repository:
    enable: true
    url: "https://github.com/wuqifei2012/ai"
    branch: main
    content_dir: content

  # ── LOCALE ─────────────────────────────────────────────────────────────────
  locale:
    date_format: "Jan 2, 2006"
    time_format: "3:04 PM"
    address_format: en-us

  # ── SECURITY ───────────────────────────────────────────────────────────────
  security:
    csp:
      policy: ""
      report_only: false
    frame_options: allow
    permissions_policy: ""

  # ── PRIVACY ────────────────────────────────────────────────────────────────
  privacy:
    enable: false
    anonymize_analytics: true

  # ── DEBUG ──────────────────────────────────────────────────────────────────
  debug:
    enable: false
    hud:
      position: bottom-left
      opacity: 1.0
    export_logs: true

  # ── PREMIUM ────────────────────────────────────────────────────────────────
  pro:
    hide_attribution: false
    affiliate_code: ""
