# Navigation Links
#   To link a homepage widget, specify the URL as a hash `#` followed by the filename of the
#     desired widget in your `content/home/` folder.
#   The weight parameter defines the order that the links will appear in.

main:
  - name: Home
    url: /
    weight: 10
  - name: About
    url: /#about
    weight: 15
  - name: Publications
    url: /#publications
    weight: 20
  - name: Projects
    url: /#projects
    weight: 25
  - name: Experience
    url: experience/
    weight: 30
  - name: Blog
    url: post/
    weight: 35
  - name: Contact
    url: /#contact
    weight: 40

footer:
  - name: Home
    url: /
    weight: 10
  - name: Publications
    url: publication/
    weight: 20
  - name: Projects
    url: projects/
    weight: 30
  - name: Blog
